version: 4.1.36
steps:
  - prompt: Identify the main call to action on the webpage.
    commands:
      - command: hover-text
        text: Sign up
        description: main call to action button in the top right corner
        action: hover
  - prompt: Click on the main call to action.
    commands:
      - command: hover-text
        text: Sign up
        description: main call to action button in the top right corner
        action: click
  - prompt: >-
      Assert that the intended action or page loads correctly.  # Use the
      content of the file from the environment
    commands:
      - command: assert
        expect: the sign-up form is visible

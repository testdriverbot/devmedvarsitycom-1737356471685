version: 4.1.36
steps:
  - prompt: Locate the "Contact Us" link on the webpage.
    commands:
      - command: hover-text
        text: Contact Us
        description: contact us link in the footer
        action: hover
  - prompt: Click on the "Contact Us" link.
    commands:
      - command: hover-text
        text: Contact Us
        description: contact us link in the footer
        action: click
  - prompt: >-
      Assert that the contact page or modal appears.  # Use the content of the
      file from the environment
    commands:
      - command: assert
        expect: the contact form is visible

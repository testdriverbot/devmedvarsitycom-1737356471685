version: 4.1.36
steps:
  - prompt: Focus on the search bar.
    commands:
      - command: hover-text
        text: Search for "Obstetrics"
        description: main search bar in the header
        action: click
  - prompt: Enter a test query such as "Obstetrics."
    commands:
      - command: type
        text: Obstetrics
  - prompt: Click the search icon.
    commands:
      - command: hover-image
        description: search icon next to the search bar
        action: click
  - prompt: >-
      Assert that the search results are displayed correctly.  # Use the content
      of the file from the environment
    commands:
      - command: assert
        expect: Certificate courses in Gynecology and Obstetrics are displayed

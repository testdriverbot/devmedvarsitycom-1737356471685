version: 4.1.36
steps:
  - prompt: Click on the "Sign Up" button.
    commands:
      - command: hover-text
        text: Sign up
        description: registration button in the top right of the header
        action: click
  - prompt: Fill in the sign-up form with test data.
    commands:
      - command: hover-text
        text: Enter your email address
        description: email input field in the sign-up form
        action: click
      - command: type
        text: test@example.com
  - prompt: Submit the form.
    commands:
      - command: hover-text
        text: Get OTP
        description: submit button in the sign-up form
        action: click
  - prompt: >-
      Assert that a confirmation message is displayed or the user is redirected
      appropriately.  # Use the content of the file from the environment
    commands:
      - command: assert
        expect: the "Enter OTP" form is displayed
